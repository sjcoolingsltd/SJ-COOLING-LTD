<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SJ Cooling Ltd</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- HERO -->
<section class="hero">
  <div class="hero-content">
    <img src="logo.png" class="logo">

    <h1>SJ Cooling Ltd</h1>
    <p>Air Conditioning & Refrigeration Specialists</p>

    <a href="tel:+447954411997" class="call-btn">📞 Call Now</a>
  </div>

  <div class="scroll-down">⌄</div>
</section>

<!-- SERVICES -->
<section class="services">
  <h2>Our Services</h2>

  <div class="card">❄️ Air Conditioning Installation</div>
  <div class="card">🛠 Service & Maintenance</div>
  <div class="card">🧊 Refrigeration Systems</div>
  <div class="card">⚡ Domestic Electrical Services</div>
</section>

<!-- INSTALL SLIDER -->
<section class="slider">
  <h2>Recent Installs</h2>

  <div class="slider-container">
    <img src="install1.jpg" class="slide active">
    <img src="install2.jpg" class="slide">
    <img src="install3.jpg" class="slide">
  </div>
</section>

<!-- QUOTE SECTION -->
<section class="quote">
  <h2>Get a Free Quote</h2>
  <p>For Air Conditioning & Refrigeration Services</p>

  <form id="quoteForm">
    <input type="text" id="name" placeholder="Your Name" required>
    <input type="tel" id="phone" placeholder="Phone Number" required>

    <select id="system" required>
      <option value="">Select System Type</option>

      <option>Wall Mounted Split System</option>
      <option>Multi Split System</option>
      <option>Ducted Air Conditioning</option>
      <option>Floor Mounted Unit</option>
      <option>Ceiling Suspended Unit</option>
      <option>Cassette Ceiling Unit</option>
      <option>Portable Air Conditioner</option>

      <option>VRF / VRV System</option>
      <option>Packaged Rooftop Unit (RTU)</option>
      <option>Air Handling Unit (AHU)</option>
      <option>Fan Coil Units (FCU)</option>

      <option>Chiller System (Air Cooled)</option>
      <option>Chiller System (Water Cooled)</option>

      <option>Cold Room / Walk-in Fridge</option>
      <option>Freezer Room</option>
      <option>Display Refrigeration</option>
      <option>Bottle Coolers / Under Counter Fridges</option>

      <option>Ventilation / Extraction Systems</option>
      <option>Heat Pump Systems</option>

      <option>Not Sure (Need Advice)</option>
    </select>

    <textarea id="details" placeholder="Describe your job (install, repair, service...)"></textarea>

    <button type="submit">Request Quote</button>
  </form>
</section>

<!-- STICKY CALL BAR -->
<div class="call-bar">
  <a href="tel:+447954411997">📞 Call Now</a>
</div>

<!-- SLIDER SCRIPT -->
<script>
let slides = document.querySelectorAll(".slide");
let i = 0;

setInterval(() => {
  slides.forEach(s => s.classList.remove("active"));
  slides[i].classList.add("active");
  i = (i + 1) % slides.length;
}, 3000);
</script>

<!-- QUOTE FORM SCRIPT -->
<script>
document.getElementById("quoteForm").addEventListener("submit", function(e) {
  e.preventDefault();

  let name = document.getElementById("name").value.trim();
  let phone = document.getElementById("phone").value.trim();
  let system = document.getElementById("system").value;
  let details = document.getElementById("details").value.trim();

  if (!name || !phone || !system) {
    alert("Please fill in all required fields.");
    return;
  }

  let subject = encodeURIComponent("New Quote Request - SJ Cooling Ltd");

  let body = encodeURIComponent(
    "New Quote Request:\n\n" +
    "Name: " + name + "\n" +
    "Phone: " + phone + "\n" +
    "System Type: " + system + "\n\n" +
    "Job Details:\n" + details
  );

  window.location.href =
    "mailto:sjcoolingltd@gmail.com?subject=" + subject + "&body=" + body;
});
</script>

</body>
</html>
