<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SJ Cooling Ltd</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- HERO (YOUR IMAGE) -->
<section class="hero"></section>

<!-- SERVICES -->
<section class="services">
  <h2>Our Services</h2>

  <div class="service-box">❄️ Air Conditioning Installation</div>
  <div class="service-box">🛠 Service & Maintenance</div>
  <div class="service-box">🧊 Refrigeration Systems</div>
  <div class="service-box">⚡ Domestic Electrical Services</div>
</section>

<!-- INSTALL SLIDER -->
<section class="slider">
  <h2>Recent Installations</h2>

  <div class="slider-container">
    <img src="install1.jpg" class="slide active">
    <img src="install2.jpg" class="slide">
    <img src="install3.jpg" class="slide">
  </div>
</section>

<!-- QUOTE -->
<section class="quote">
  <h2>Get a Free Quote</h2>

  <input type="text" placeholder="Your Name">
  <input type="tel" placeholder="Phone Number">
  <textarea placeholder="What do you need?"></textarea>

  <button>Request Quote</button>
</section>

<!-- SCRIPT -->
<script>
let slides = document.querySelectorAll(".slide");
let index = 0;

function showSlide() {
  slides.forEach(slide => slide.classList.remove("active"));
  slides[index].classList.add("active");

  index++;
  if (index >= slides.length) index = 0;
}

setInterval(showSlide, 3000);
</script>

</body>
</html>
