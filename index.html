<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SJ Cooling Ltd</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- HERO -->
<section class="hero">

  <div class="hero-content">

    <img src="logo.png" class="logo" alt="SJ Cooling Ltd Logo">

    <h1>SJ Cooling Ltd</h1>
    <p>Air Conditioning & Refrigeration Specialists</p>

    <!-- WORKING CALL BUTTON -->
    <a href="tel:+447954411997" class="call-btn">📞 Call Now</a>

  </div>

  <div class="scroll-down">⌄</div>

</section>

<!-- SERVICES -->
<section class="services">
  <h2>Our Services</h2>

  <div class="card">❄️ Air Conditioning Installation</div>
  <div class="card">🛠 Service & Maintenance</div>
  <div class="card">🧊 Refrigeration Systems</div>
  <div class="card">⚡ Domestic Electrical Services</div>
</section>

<!-- INSTALL SLIDER -->
<section class="slider">
  <h2>Recent Installs</h2>

  <div class="slider-container">
    <img src="install1.jpg" class="slide active">
    <img src="install2.jpg" class="slide">
    <img src="install3.jpg" class="slide">
  </div>
</section>

<!-- SCRIPT -->
<script>
let slides = document.querySelectorAll(".slide");
let i = 0;

setInterval(() => {
  slides.forEach(s => s.classList.remove("active"));
  slides[i].classList.add("active");
  i = (i + 1) % slides.length;
}, 3000);
</script>

</body>
</html>
