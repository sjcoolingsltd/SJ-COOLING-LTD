<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SJ Cooling Ltd</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
}

/* HERO SECTION */
.hero {
  height: 100vh;
  background: url("hero-bg.jpg") no-repeat center center/cover;
  display: flex;
}

/* DARK OVERLAY */
.overlay {
  background: rgba(0, 0, 0, 0.65);
  width: 100%;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  color: #fff;
  text-align: center;
  padding: 20px;
}

/* LOGO */
.logo {
  width: 120px;
  margin-bottom: 15px;
}

/* TEXT */
h1 {
  font-size: 28px;
  margin: 10px 0;
}

p {
  font-size: 16px;
  margin-bottom: 25px;
}

/* BUTTON */
.btn {
  background: linear-gradient(135deg, #00c6ff, #0072ff);
  color: white;
  padding: 14px 26px;
  border-radius: 10px;
  text-decoration: none;
  font-weight: bold;
  box-shadow: 0 5px 20px rgba(0,0,0,0.4);
}

/* SERVICES SECTION */
.services {
  background: #0d1117;
  color: white;
  padding: 40px 20px;
  text-align: center;
}

.services h2 {
  margin-bottom: 25px;
}

.service-box {
  margin-bottom: 20px;
  padding: 15px;
  background: #161b22;
  border-radius: 10px;
}

/* QUOTE SECTION */
.quote {
  padding: 40px 20px;
  text-align: center;
  background: #f5f5f5;
}

.quote input, .quote textarea {
  width: 90%;
  max-width: 400px;
  margin: 8px 0;
  padding: 12px;
  border-radius: 6px;
  border: 1px solid #ccc;
}

.quote button {
  background: #0072ff;
  color: white;
  padding: 12px 25px;
  border: none;
  border-radius: 8px;
  margin-top: 10px;
}
</style>
</head>

<body>

<!-- HERO -->
<section class="hero">
  <div class="overlay">
    <img src="logo.png" class="logo" alt="SJ Cooling Ltd">

    <h1>SJ Cooling Ltd</h1>
    <p>Air Conditioning & Refrigeration Specialists</p>

    <a href="tel:07954411997" class="btn">📞 Call Now</a>
  </div>
</section>

<!-- SERVICES -->
<section class="services">
  <h2>Our Services</h2>

  <div class="service-box">❄️ Air Conditioning Installation</div>
  <div class="service-box">🛠 Service & Maintenance</div>
  <div class="service-box">🧊 Refrigeration Systems</div>
  <div class="service-box">⚡ Domestic Electrical Services</div>
</section>

<!-- QUOTE FORM -->
<section class="quote">
  <h2>Get a Free Quote</h2>

  <input type="text" placeholder="Your Name"><br>
  <input type="tel" placeholder="Phone Number"><br>
  <textarea placeholder="What do you need?"></textarea><br>

  <button>Request Quote</button>
</section>

</body>
</html>
