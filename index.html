<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SJ Cooling Ltd</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- HERO -->
<section class="hero">
  <div class="overlay">
    <img src="logo.png" class="logo">

    <h1>SJ Cooling Ltd</h1>
    <p>Air Conditioning & Refrigeration Specialists</p>

    <a href="tel:07954411997" class="btn">Call Now</a>
  </div>
</section>

<!-- SLIDER -->
<section class="slider">
  <h2>Recent Installations</h2>

  <div class="slider-container">
    <img src="install1.jpg" class="slide active">
    <img src="install2.jpg" class="slide">
    <img src="install3.jpg" class="slide">
  </div>
</section>

<!-- SCRIPT -->
<script>
let slides = document.querySelectorAll(".slide");
let index = 0;

function showSlide() {
  slides.forEach((slide) => slide.classList.remove("active"));
  slides[index].classList.add("active");

  index++;
  if (index >= slides.length) {
    index = 0;
  }
}

setInterval(showSlide, 3000);
</script>

</body>
</html>
